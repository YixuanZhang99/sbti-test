<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>互联网大厂程序员人格鉴定 v2.0</title>
  <style>
    /* 核心变量 */
    :root {
      --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --bg: #F5F5F5;
      --card-bg: #FFFFFF;
      --card-radius: 16px;
      --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
      --text: #333;
      --text-light: #888;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }

    /* 基础重置 */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      font-family: var(--font);
      margin: 0;
      color: var(--text);
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
    }

    /* 渐变文字 */
    .gradient-text {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 等宽字体文字 */
    .mono-text {
      font-family: var(--mono);
    }

    /* 卡片 */
    .card {
      background: var(--card-bg);
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow);
      padding: 24px;
    }

    /* 主按钮 */
    .btn-primary {
      background: var(--gradient);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(102, 126, 234, 0.4);
    }

    /* 次要按钮 */
    .btn-secondary {
      border: 2px solid #667eea;
      color: #667eea;
      background: transparent;
      border-radius: 12px;
      padding: 16px 32px;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(102, 126, 234, 0.2);
    }

    /* 文字按钮 */
    .btn-text {
      background: none;
      border: none;
      color: var(--text-light);
      text-decoration: underline;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }

    .btn-text:hover {
      color: var(--text);
    }

    /* 选项卡片 */
    .option-card {
      background: var(--card-bg);
      border: 2px solid #eee;
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }

    .option-card:hover {
      transform: translateY(-2px);
      border-color: #667eea;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
    }

    .option-card.selected {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.05);
    }

    /* 题号导航按钮 */
    .nav-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #ddd;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--text-light);
    }

    .nav-dot.answered {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .nav-dot.current {
      border-color: #764ba2;
      font-weight: bold;
    }

    /* Spinner */
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #E0E0E0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 维度条 */
    .dim-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 12px 0;
    }

    .dim-label {
      font-size: 13px;
      color: var(--text-light);
      min-width: 32px;
      text-align: center;
    }

    .dim-bar {
      flex: 1;
      height: 12px;
      background: #E0E0E0;
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .dim-fill-left {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 6px;
      transition: width 0.5s ease;
    }

    /* 相性卡片 */
    .compat-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
      box-shadow: var(--card-shadow);
    }

    .compat-card .compat-label {
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 4px;
    }

    .compat-card .compat-code {
      font-weight: bold;
      color: #667eea;
      font-size: 15px;
    }

    .compat-card .compat-desc {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    /* 动画 */
    .fade-in {
      animation: fadeIn 0.3s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page {
      opacity: 0;
      transition: opacity 0.3s ease;
      flex-direction: column;
    }

    .page.active {
      opacity: 1;
    }

    /* 响应式 - 桌面端 */
    @media (min-width: 768px) {
      .container {
        max-width: 720px;
        padding: 40px;
      }

      #page-home h1.gradient-text {
        font-size: 2.8rem;
      }

      #page-home .mono-text {
        font-size: 16px;
      }

      .option-card {
        padding: 20px 24px;
        font-size: 16px;
      }

      .nav-dot {
        width: 32px;
        height: 32px;
        font-size: 12px;
      }

      #quiz-question {
        font-size: 1.4rem;
      }

      #result-code {
        font-size: 3rem;
      }

      #result-name {
        font-size: 1.8rem;
      }

      #result-desc {
        font-size: 16px;
        padding: 28px;
      }

      .compat-card {
        padding: 20px;
      }

      .compat-card .compat-code {
        font-size: 17px;
      }

      .compat-card .compat-desc {
        font-size: 14px;
      }

      .dim-label {
        font-size: 15px;
        min-width: 40px;
      }

      .dim-bar {
        height: 14px;
      }

      .btn-primary, .btn-secondary {
        font-size: 18px;
        padding: 16px 40px;
      }

      #analyzing-text {
        font-size: 16px;
      }

      .spinner {
        width: 56px;
        height: 56px;
      }
    }

    /* 响应式 - 大屏桌面 */
    @media (min-width: 1024px) {
      .container {
        max-width: 800px;
      }

      #page-home h1.gradient-text {
        font-size: 3.2rem;
      }
    }

    /* 响应式 - 移动端 */
    @media (max-width: 480px) {
      .container {
        padding: 16px;
      }

      #result-compat {
        grid-template-columns: 1fr;
      }

      h1.gradient-text {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- 首页 -->
  <section id="page-home" class="container page active" style="display:flex;flex-direction:column;align-items:center;min-height:100vh;justify-content:center">
    <h1 class="gradient-text" style="font-size:2rem;text-align:center">互联网大厂程序员人格鉴定 v2.0</h1>
    <p class="mono-text" style="color:var(--text-light);text-align:center;margin:8px 0 32px">// 测测你是什么类型的打工人</p>
    <p id="stat-line" style="color:var(--text-light);font-size:14px;margin-bottom:32px">已有 <span id="total-count" style="color:#667eea;font-weight:bold">---</span> 位打工人完成测试</p>
    <button id="btn-start" class="btn-primary">开始鉴定 →</button>
    <p style="color:#bbb;font-size:12px;margin-top:48px">本测试纯属娱乐，如有雷同纯属内卷</p>
  </section>

  <!-- 答题页 -->
  <section id="page-quiz" class="container page" style="display:none;flex-direction:column">
    <div id="quiz-nav" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px"></div>
    <div style="background:#E0E0E0;border-radius:3px;height:6px;margin-bottom:8px">
      <div id="progress-bar" style="background:var(--gradient);height:100%;border-radius:3px;width:0;transition:width 0.3s ease"></div>
    </div>
    <p id="quiz-number" style="color:var(--text-light);font-size:14px;margin-bottom:16px">Q1/24</p>
    <div id="quiz-question-wrap">
      <h2 id="quiz-question" style="font-size:1.25rem;margin-bottom:24px"></h2>
      <div id="quiz-options"></div>
    </div>
  </section>

  <!-- 分析中页 -->
  <section id="page-analyzing" class="container page" style="min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center">
    <div class="spinner"></div>
    <div id="analyzing-text" style="font-family:var(--mono);color:#27AE60;font-size:14px;margin-top:32px;min-height:120px;line-height:2"></div>
    <div style="width:200px;background:#E0E0E0;border-radius:3px;height:4px;margin-top:24px">
      <div id="analyzing-bar" style="background:var(--gradient);height:100%;border-radius:3px;width:0;transition:width 0.5s ease"></div>
    </div>
  </section>

  <!-- 结果页 -->
  <section id="page-result" class="container page" style="display:none;flex-direction:column;padding-bottom:60px">
    <div style="text-align:center;margin:32px 0">
      <p style="color:var(--text-light);font-size:14px;margin-bottom:8px">你的程序员人格是</p>
      <h1 id="result-code" class="gradient-text" style="font-size:2.5rem;margin:0">---</h1>
      <h2 id="result-name" style="font-size:1.5rem;color:var(--text);margin:8px 0 0">---</h2>
    </div>
    <div id="result-svg" style="text-align:center;margin:24px 0"></div>
    <div id="result-desc" class="card" style="border-left:4px solid #667eea;margin:24px 0;font-size:15px;line-height:1.8;color:#555"></div>
    <div id="result-dimensions" style="margin:24px 0"></div>
    <p id="result-stats" style="text-align:center;color:var(--text-light);font-size:14px;margin:16px 0;display:none"></p>
    <div id="result-compat" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:24px 0"></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:32px">
      <button id="btn-share" class="btn-primary" style="width:100%;max-width:320px">📋 生成分享文案</button>
      <button id="btn-invite" class="btn-secondary" style="width:100%;max-width:320px">🔗 拉同事来测</button>
      <button id="btn-restart" class="btn-text" style="margin-top:8px">重新测试</button>
    </div>
    <div id="copy-toast" style="position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;opacity:0;transition:opacity 0.3s;pointer-events:none">已复制到剪贴板！</div>
  </section>

  <!-- 隐藏的 SVG 容器 -->
  <div id="svg-container" style="display:none">
<!-- 1. CRUD — 996.ICU — 趴在桌上，头顶输液瓶 -->

// ═══ 计分函数 ═══
function calculateResult(answers) {
  // answers 是长度24的数组，值为 0/1/2/3 (对应选项索引)
  // 得分：选项0=1分，选项1=2分，选项2=3分，选项3=4分

  const scores = [0, 0, 0, 0]; // 4组得分
  const ranges = [[0, 6], [6, 12], [12, 18], [18, 24]]; // 每组题目范围

  ranges.forEach((range, i) => {
    for (let j = range[0]; j < range[1]; j++) {
      scores[i] += (answers[j] + 1);
    }
  });

  // 计算百分比（用于维度条显示）
  const maxScores = [24, 24, 24, 24];
  const minScores = [6, 6, 6, 6];
  const percentages = scores.map((s, i) =>
    Math.round((s - minScores[i]) / (maxScores[i] - minScores[i]) * 100)
  );

  // 计算字母（中位数15）
  const letters = [
    scores[0] > 15 ? 'C' : 'M',
    scores[1] > 15 ? 'B' : 'R',
    scores[2] > 15 ? 'S' : 'U',
    scores[3] > 15 ? 'H' : 'D'
  ];

  const typeCode = letters.join('');
  return { typeCode, scores, percentages, personality: PERSONALITIES[typeCode] };
}

function renderQuestion(index) {
  currentQuestion = index;
  var q = QUESTIONS[index];

  // 更新导航
  var nav = document.getElementById("quiz-nav");
  nav.innerHTML = "";
  for (var i = 0; i < 24; i++) {
    var dot = document.createElement("div");
    dot.className =
      "nav-dot" +
      (answers[i] >= 0 ? " answered" : "") +
      (i === index ? " current" : "");
    dot.textContent = i + 1;
    dot.onclick = (function (idx) {
      return function () {
        if (answers[idx] >= 0 || idx === index) renderQuestion(idx);
      };
    })(i);
    nav.appendChild(dot);
  }

  // 更新进度
  document.getElementById("progress-bar").style.width =
    ((index + 1) / 24) * 100 + "%";
  document.getElementById("quiz-number").textContent =
    "Q" + (index + 1) + "/24";

  // 更新题目（带淡入效果）
  var wrap = document.getElementById("quiz-question-wrap");
  wrap.classList.remove("fade-in");
  void wrap.offsetWidth;
  wrap.classList.add("fade-in");

  document.getElementById("quiz-question").textContent = q.q;

  var optionsDiv = document.getElementById("quiz-options");
  optionsDiv.innerHTML = "";

  // 生成带原始索引的选项数组并 shuffle
  var shuffled = q.opts.map(function (opt, i) { return { text: opt, origIdx: i }; });
  for (var k = shuffled.length - 1; k > 0; k--) {
    var r = Math.floor(Math.random() * (k + 1));
    var tmp = shuffled[k]; shuffled[k] = shuffled[r]; shuffled[r] = tmp;
  }

  shuffled.forEach(function (item) {
    var card = document.createElement("div");
    card.className =
      "option-card" + (answers[index] === item.origIdx ? " selected" : "");
    card.textContent = item.text;
    card.dataset.origIdx = item.origIdx;
    card.onclick = function () {
      selectOption(index, item.origIdx);
    };
    optionsDiv.appendChild(card);
  });
}

function selectOption(qIndex, optIndex) {
  answers[qIndex] = optIndex;

  // 显示选中状态
  document.querySelectorAll(".option-card").forEach(function (c) {
    c.classList.toggle("selected", parseInt(c.dataset.origIdx) === optIndex);
  });

  // 延迟300ms后跳下一题或完成
  setTimeout(function () {
    if (qIndex < 23) {
      // 找下一个未答的题，或直接下一题
      renderQuestion(qIndex + 1);
    } else {
      // 检查是否全部作答
      var unanswered = answers.findIndex(function (a) {
        return a < 0;
      });
      if (unanswered >= 0) {
        renderQuestion(unanswered);
      } else {
        startAnalyzing();
      }
    }
  }, 300);
}

        clearInterval(typeInterval);
        msgIndex++;
        setTimeout(showNextMessage, 400);
      }
    }, 30);
  }

  setTimeout(showNextMessage, 300);
}

function submitResult(result) {
  // 1. 插入记录到 Supabase
  fetch(SUPABASE_URL + "/rest/v1/records", {
    method: "POST",
    headers: sbHeaders({"Prefer": "return=minimal"}),
    body: JSON.stringify({
      result_code: result.typeCode,
      result_name: result.personality.name,
      answers: answers,
    }),
  }).catch(function () {});

  // 2. 插入后稍等再查统计
  setTimeout(function () {
    Promise.all([
      fetch(SUPABASE_URL + "/rest/v1/records?select=id&result_code=eq." + result.typeCode, {
        headers: SB_HEADERS,
      }).then(function (r) { return r.json(); }).then(function (d) { return d.length; }),
      fetch(SUPABASE_URL + "/rest/v1/records?select=id", {
        headers: SB_HEADERS,
      }).then(function (r) { return r.json(); }).then(function (d) { return d.length; })
    ]).then(function (counts) {
      var same = counts[0], total = counts[1];
      if (total > 0) {
        var pct = (same / total * 100).toFixed(1) + "%";
        var statsEl = document.getElementById("result-stats");
        statsEl.textContent = pct + " 的人和你是同类（共 " + total + " 人参与）";
        statsEl.style.display = "block";
      }
    }).catch(function () {});
  }, 1000);
  // 2. 插入后稍等再查统计
  setTimeout(function () {
    Promise.all([
      fetch(SUPABASE_URL + "/rest/v1/records?select=id&result_code=eq." + result.typeCode, {
        headers: SB_HEADERS,
      }).then(function (r) { return r.json(); }).then(function (d) { return d.length; }),
      fetch(SUPABASE_URL + "/rest/v1/records?select=id", {
        headers: SB_HEADERS,
      }).then(function (r) { return r.json(); }).then(function (d) { return d.length; })
    ]).then(function (counts) {
      var same = counts[0], total = counts[1];
      if (total > 0) {
        var pct = (same / total * 100).toFixed(1) + "%";
        var statsEl = document.getElementById("result-stats");
        statsEl.textContent = pct + " 的人和你是同类（共 " + total + " 人参与）";
        statsEl.style.display = "block";
      }
    }).catch(function () {});
  }, 1000);
}

document.getElementById("btn-share").onclick = function () {
  var result = calculateResult(answers);
  var p = result.personality;
  var text =
    "我做了个程序员人格测试，结果我是 " +
    p.code +
    " —— " +
    p.name +
    "。\n" +
    p.desc.slice(0, 50) +
    "...\n你也来试试？" +
    location.href;

  navigator.clipboard
    .writeText(text)
    .then(function () {
      var toast = document.getElementById("copy-toast");
      toast.style.opacity = "1";
      setTimeout(function () {
        toast.style.opacity = "0";
      }, 2000);
    })
    .catch(function () {
      // fallback
      var ta = document.createElement("textarea");
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      var toast = document.getElementById("copy-toast");
      toast.style.opacity = "1";
      setTimeout(function () {
        toast.style.opacity = "0";
      }, 2000);
    });
};

document.getElementById("btn-invite").onclick = function () {
  var text =
    "来测测你是什么类型的打工人！互联网大厂程序员人格鉴定 \uD83D\uDC49 " +
    location.href;
  navigator.clipboard.writeText(text).then(function () {
    var toast = document.getElementById("copy-toast");
    toast.textContent = "链接已复制，快去分享！";
    toast.style.opacity = "1";
    setTimeout(function () {
      toast.style.opacity = "0";
      toast.textContent = "已复制到剪贴板！";
    }, 2000);
  });
};

document.getElementById("btn-restart").onclick = function () {
  answers = new Array(24).fill(-1);

  showPage("home");
};

showPage("home");

// 获取统计数据
(function () {
  fetch(SUPABASE_URL + "/rest/v1/records?select=id", {
    headers: SB_HEADERS,
  })
    .then(function (resp) {
      var range = resp.headers.get("content-range");
      if (range) {
        var total = parseInt(range.split("/")[1]) || 0;
        if (total > 0) {
          document.getElementById("total-count").textContent = total.toLocaleString();
        }
      }
    })
    .catch(function () {
      // 兜底数字
      document.getElementById("total-count").textContent = (
        Math.floor(Math.random() * 30000) + 50000
      ).toLocaleString();
    });
})();

// 按钮绑定
document.getElementById("btn-start").onclick = function () {
  showPage("quiz");
  renderQuestion(0);
};
